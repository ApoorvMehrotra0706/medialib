services:
  - type: web
    name: medialib-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: RAWG_API_KEY
        sync: false
